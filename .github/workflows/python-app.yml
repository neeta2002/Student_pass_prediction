name: Student ML CI Pipeline

on:
    push:
        branches:
            -main

    pull_request:
        branches:
            - main

jobs:
    build:
        runs-on: ubunto-latest
        steps:
            - name: Checkout Repositery   
              uses: actions/checkout@v4 
              
            - name: Setup Python
              uses: actions/setup-pthon@v5
              with: 
                python-version: "3.10"
            
        
            - name: Install Dependencies
              run: |
               pip install -r requirements

            - name: Trian Model
              run: |
                python src/train.py
            
            - name: Run Tests
              run : |
                pytest


